name: Build SpecterGrid APK

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - 'spectergrid-apk/**'

permissions:
  contents: write

jobs:
  build-spectergrid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct SpecterGrid project
        shell: bash
        run: |
          cat spectergrid-source/part-*.b64 > SpecterGrid_Source.zip.b64
          base64 --decode SpecterGrid_Source.zip.b64 > SpecterGrid_Source.zip
          echo "78a62b90822c112d1de19f15b19d5868b5d62d87ecb44ad14416034ce7c6ac37  SpecterGrid_Source.zip" | sha256sum -c -
          rm -rf spectergrid-build
          mkdir spectergrid-build
          unzip -q SpecterGrid_Source.zip -d spectergrid-build
          test -f spectergrid-build/SpecterGrid/settings.gradle.kts

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build SpecterGrid APK
        working-directory: spectergrid-build/SpecterGrid
        run: gradle --no-daemon clean assembleDebug --stacktrace

      - name: Publish installable APK into repository
        shell: bash
        run: |
          mkdir -p spectergrid-apk
          cp spectergrid-build/SpecterGrid/app/build/outputs/apk/debug/app-debug.apk spectergrid-apk/SpecterGrid.apk
          sha256sum spectergrid-apk/SpecterGrid.apk > spectergrid-apk/SpecterGrid.apk.sha256
          git config user.name "SpecterGrid Builder"
          git config user.email "actions@github.com"
          git add spectergrid-apk/SpecterGrid.apk spectergrid-apk/SpecterGrid.apk.sha256
          if ! git diff --cached --quiet; then
            git commit -m "Publish SpecterGrid installable APK [skip ci]"
            git push
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpecterGrid-installable-apk
          path: spectergrid-apk/*
          if-no-files-found: error
