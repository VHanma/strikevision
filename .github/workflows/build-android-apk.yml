name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Align Expo packages for CI
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.dependencies = {
            'expo': '~51.0.39',
            'expo-av': '~14.0.7',
            'expo-camera': '~15.0.16',
            'expo-router': '~3.5.24',
            'expo-status-bar': '~1.12.1',
            'expo-secure-store': '~13.0.2',
            'expo-haptics': '~13.0.1',
            'expo-linear-gradient': '~13.0.2',
            'react': '18.2.0',
            'react-native': '0.74.5',
            '@react-navigation/native': '^6.1.18',
            'react-native-safe-area-context': '4.10.5',
            'react-native-screens': '3.31.1',
            'react-native-reanimated': '~3.10.1',
            'react-native-gesture-handler': '~2.16.1',
            'zustand': '^4.5.4',
            'date-fns': '^3.6.0'
          };
          pkg.devDependencies = {
            '@babel/core': '^7.24.0',
            '@types/react': '~18.2.79',
            'typescript': '~5.3.3'
          };
          delete pkg.devDependencies['@types/react-native'];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          NODE

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Remove missing app icon references for CI
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          delete data.expo.icon;
          delete data.expo.splash;
          if (data.expo.android) delete data.expo.android.adaptiveIcon;
          fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
          NODE

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrikeVision-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
