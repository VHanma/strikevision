name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build native round tracker APK
        run: |
          cd native-apk
          gradle :app:assembleDebug --stacktrace

      - name: Show APK outputs
        if: always()
        run: find native-apk/app/build/outputs -type f | sort || true

      - name: Upload round tracker APK
        uses: actions/upload-artifact@v4
        with:
          name: StrikeVision-round-tracker-apk
          path: native-apk/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
