name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create dependency-free native camera project
        run: |
          rm -rf native-apk
          mkdir -p native-apk/app/src/main/java/com/strikevision/app
          mkdir -p native-apk/app/src/main/res/values

          cat > native-apk/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'StrikeVisionNative'
          include ':app'
          EOF

          cat > native-apk/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > native-apk/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.strikevision.app'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.strikevision.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 4
                  versionName '1.0.4-real-camera'
              }
          }
          EOF

          cat > native-apk/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <application android:theme="@style/AppTheme" android:label="StrikeVision" android:allowBackup="true" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:screenOrientation="portrait" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > native-apk/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:navigationBarColor">#000000</item>
                  <item name="android:colorAccent">#A3FF12</item>
              </style>
          </resources>
          EOF

          cat > native-apk/app/src/main/java/com/strikevision/app/MainActivity.java <<'EOF'
          package com.strikevision.app;

          import android.Manifest;
          import android.app.Activity;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.hardware.Camera;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.SurfaceHolder;
          import android.view.SurfaceView;
          import android.view.View;
          import android.widget.Button;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.util.List;

          @SuppressWarnings("deprecation")
          public class MainActivity extends Activity implements SurfaceHolder.Callback, Camera.PreviewCallback {
              private FrameLayout frame;
              private SurfaceView surface;
              private LinearLayout overlay;
              private TextView status;
              private TextView liveMeter;
              private Button startBtn;
              private Camera camera;
              private int cameraId = -1;
              private int previewWidth = 0;
              private int previewHeight = 0;
              private byte[] previous = null;
              private double currentMotion = 0;
              private double peakMotion = 0;
              private double sumMotion = 0;
              private int motionFrames = 0;
              private boolean testActive = false;
              private long activeStart = 0;
              private final Handler handler = new Handler(Looper.getMainLooper());

              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  if (android.os.Build.VERSION.SDK_INT >= 23 && checkSelfPermission(Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.CAMERA}, 10);
                  } else {
                      showCamera();
                  }
              }

              @Override public void onRequestPermissionsResult(int r, String[] p, int[] g) {
                  super.onRequestPermissionsResult(r, p, g);
                  showCamera();
              }

              @Override protected void onPause() {
                  super.onPause();
                  stopCamera();
              }

              private void showCamera() {
                  frame = new FrameLayout(this);
                  frame.setBackgroundColor(Color.BLACK);
                  surface = new SurfaceView(this);
                  surface.getHolder().addCallback(this);
                  frame.addView(surface, new FrameLayout.LayoutParams(-1, -1));

                  overlay = new LinearLayout(this);
                  overlay.setOrientation(LinearLayout.VERTICAL);
                  overlay.setPadding(34, 64, 34, 42);
                  overlay.setBackgroundColor(Color.argb(85, 0, 0, 0));
                  frame.addView(overlay, new FrameLayout.LayoutParams(-1, -1));
                  setContentView(frame);

                  TextView logo = text("STRIKEVISION", 31, Color.rgb(245,245,245), Typeface.BOLD);
                  logo.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(logo);

                  status = text("Camera live. Hold still to test zero scoring.", 17, Color.rgb(163,255,18), Typeface.BOLD);
                  status.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(status);

                  liveMeter = text("Motion: 0", 16, Color.rgb(59,130,246), Typeface.BOLD);
                  liveMeter.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(liveMeter);

                  View spacer = new View(this);
                  overlay.addView(spacer, new LinearLayout.LayoutParams(1, 0, 1));

                  startBtn = btn("Start Real Camera Test");
                  startBtn.setOnClickListener(v -> startTest());
                  overlay.addView(startBtn);

                  Button reset = btn("Restart Camera");
                  reset.setOnClickListener(v -> { stopCamera(); showCamera(); });
                  overlay.addView(reset);

                  startUiLoop();
              }

              private void startCamera(SurfaceHolder holder) {
                  try {
                      cameraId = findFrontCamera();
                      if (cameraId < 0) cameraId = 0;
                      camera = Camera.open(cameraId);
                      Camera.Parameters params = camera.getParameters();
                      Camera.Size chosen = chooseSize(params.getSupportedPreviewSizes());
                      if (chosen != null) {
                          params.setPreviewSize(chosen.width, chosen.height);
                          previewWidth = chosen.width;
                          previewHeight = chosen.height;
                      }
                      camera.setParameters(params);
                      camera.setDisplayOrientation(90);
                      camera.setPreviewDisplay(holder);
                      camera.setPreviewCallback(this);
                      camera.startPreview();
                      status.setText("Camera live. Motion meter is real.");
                  } catch (Exception e) {
                      status.setText("Camera start failed: " + e.getClass().getSimpleName());
                  }
              }

              private int findFrontCamera() {
                  int count = Camera.getNumberOfCameras();
                  Camera.CameraInfo info = new Camera.CameraInfo();
                  for (int i = 0; i < count; i++) {
                      Camera.getCameraInfo(i, info);
                      if (info.facing == Camera.CameraInfo.CAMERA_FACING_FRONT) return i;
                  }
                  return -1;
              }

              private Camera.Size chooseSize(List<Camera.Size> sizes) {
                  if (sizes == null || sizes.isEmpty()) return null;
                  Camera.Size best = sizes.get(0);
                  for (Camera.Size s : sizes) {
                      int pixels = s.width * s.height;
                      if (pixels >= 300000 && pixels <= 1000000) return s;
                      if (pixels < best.width * best.height) best = s;
                  }
                  return best;
              }

              private void stopCamera() {
                  try {
                      if (camera != null) {
                          camera.setPreviewCallback(null);
                          camera.stopPreview();
                          camera.release();
                          camera = null;
                      }
                  } catch (Exception ignored) {}
              }

              @Override public void surfaceCreated(SurfaceHolder h) { startCamera(h); }
              @Override public void surfaceChanged(SurfaceHolder h, int f, int w, int he) {}
              @Override public void surfaceDestroyed(SurfaceHolder h) { stopCamera(); }

              @Override public void onPreviewFrame(byte[] data, Camera cam) {
                  if (previewWidth <= 0 || previewHeight <= 0) return;
                  int sw = 36;
                  int sh = 28;
                  byte[] now = new byte[sw * sh];
                  int idx = 0;
                  for (int y = 0; y < sh; y++) {
                      int yy = y * previewHeight / sh;
                      int row = yy * previewWidth;
                      for (int x = 0; x < sw; x++) {
                          int xx = x * previewWidth / sw;
                          now[idx++] = data[row + xx];
                      }
                  }
                  if (previous != null) {
                      long diff = 0;
                      for (int i = 0; i < now.length; i++) {
                          diff += Math.abs((now[i] & 255) - (previous[i] & 255));
                      }
                      double motion = diff / (double) now.length;
                      currentMotion = motion;
                      if (testActive && System.currentTimeMillis() - activeStart > 450) {
                          peakMotion = Math.max(peakMotion, motion);
                          sumMotion += motion;
                          motionFrames++;
                      }
                  }
                  previous = now;
              }

              private void startTest() {
                  if (startBtn != null) startBtn.setEnabled(false);
                  previous = null;
                  currentMotion = 0;
                  peakMotion = 0;
                  sumMotion = 0;
                  motionFrames = 0;
                  testActive = false;
                  status.setText("3");
                  handler.postDelayed(() -> status.setText("2"), 1000);
                  handler.postDelayed(() -> status.setText("1"), 2000);
                  handler.postDelayed(() -> {
                      activeStart = System.currentTimeMillis();
                      testActive = true;
                      status.setText("STRIKE NOW");
                  }, 3000);
                  handler.postDelayed(() -> {
                      testActive = false;
                      showResult();
                  }, 8200);
              }

              private void showResult() {
                  double avg = motionFrames > 0 ? sumMotion / motionFrames : 0;
                  int score = (int)Math.round(Math.min(100, peakMotion * 3.0 + avg));
                  int mph = score < 8 ? 0 : Math.max(4, (int)Math.round(score * 0.43));
                  int impact = score < 8 ? 0 : Math.min(100, (int)Math.round(score * 1.12));
                  String note;
                  if (score < 8) note = "No clean strike detected. Holding still now produces a true zero score.";
                  else if (score < 30) note = "Light motion detected. Keep your hand visible and punch through the center of the camera.";
                  else if (score < 65) note = "Solid strike motion detected. Snap out, recoil fast, and return to stance.";
                  else note = "Fast burst detected. Strong acceleration. Keep the guard compact after the strike.";

                  overlay.removeAllViews();
                  TextView done = text("Session Complete", 30, Color.rgb(245,245,245), Typeface.BOLD);
                  done.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(done);
                  TextView speed = text(mph + " mph", 56, Color.rgb(163,255,18), Typeface.BOLD);
                  speed.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(speed);
                  TextView impactView = text("Impact Score: " + impact, 23, Color.rgb(59,130,246), Typeface.BOLD);
                  impactView.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(impactView);
                  TextView raw = text("Peak motion: " + Math.round(peakMotion) + " | Avg: " + Math.round(avg), 14, Color.rgb(180,180,180), Typeface.BOLD);
                  raw.setGravity(Gravity.CENTER_HORIZONTAL);
                  overlay.addView(raw);
                  overlay.addView(card("Coach Note", note));
                  View spacer = new View(this);
                  overlay.addView(spacer, new LinearLayout.LayoutParams(1, 0, 1));
                  Button again = btn("Run Again");
                  again.setOnClickListener(v -> { if (startBtn != null) startBtn.setEnabled(true); showCamera(); });
                  overlay.addView(again);
              }

              private void startUiLoop() {
                  handler.postDelayed(new Runnable() {
                      public void run() {
                          if (liveMeter != null) liveMeter.setText("Motion: " + Math.round(currentMotion));
                          handler.postDelayed(this, 250);
                      }
                  }, 250);
              }

              private TextView text(String value, int sp, int color, int style) {
                  TextView t = new TextView(this);
                  t.setText(value);
                  t.setTextSize(sp);
                  t.setTextColor(color);
                  t.setTypeface(Typeface.DEFAULT, style);
                  t.setPadding(0, 10, 0, 10);
                  return t;
              }

              private Button btn(String label) {
                  Button b = new Button(this);
                  b.setText(label);
                  b.setTextColor(Color.WHITE);
                  b.setTextSize(16);
                  b.setTypeface(Typeface.DEFAULT, Typeface.BOLD);
                  b.setAllCaps(false);
                  b.setBackground(bg(Color.rgb(59,130,246), Color.rgb(59,130,246)));
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1, 132);
                  p.setMargins(0, 18, 0, 0);
                  b.setLayoutParams(p);
                  return b;
              }

              private View card(String title, String body) {
                  LinearLayout c = new LinearLayout(this);
                  c.setOrientation(LinearLayout.VERTICAL);
                  c.setPadding(28, 26, 28, 26);
                  c.setBackground(bg(Color.rgb(23,23,23), Color.rgb(45,45,45)));
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1, -2);
                  p.setMargins(0, 20, 0, 0);
                  c.setLayoutParams(p);
                  c.addView(text(title, 21, Color.rgb(245,245,245), Typeface.BOLD));
                  c.addView(text(body, 15, Color.rgb(170,170,170), Typeface.NORMAL));
                  return c;
              }

              private GradientDrawable bg(int color, int stroke) {
                  GradientDrawable g = new GradientDrawable();
                  g.setColor(color);
                  g.setCornerRadius(28);
                  g.setStroke(2, stroke);
                  return g;
              }
          }
          EOF

      - name: Build real camera APK
        run: |
          cd native-apk
          gradle :app:assembleDebug --stacktrace

      - name: Show APK outputs
        if: always()
        run: find native-apk/app/build/outputs -type f | sort || true

      - name: Upload real camera APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrikeVision-real-camera-apk
          path: native-apk/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
