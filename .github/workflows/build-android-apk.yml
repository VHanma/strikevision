name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch Pose Core Gradle config
        run: |
          cat > native-apk/gradle.properties <<'EOF'
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=35
          EOF
          cat > native-apk/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.strikevision.app'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.strikevision.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 6
                  versionName '1.2-pose-core'
              }
          }
          configurations.configureEach {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          dependencies {
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'androidx.activity:activity:1.9.3'
              implementation 'androidx.camera:camera-core:1.3.4'
              implementation 'androidx.camera:camera-camera2:1.3.4'
              implementation 'androidx.camera:camera-lifecycle:1.3.4'
              implementation 'androidx.camera:camera-view:1.3.4'
          EOF
          printf "              implementation 'com.google.mlkit:pose-" >> native-apk/app/build.gradle
          printf "detection:18.0.0-beta5'\n" >> native-apk/app/build.gradle
          printf "          }\n" >> native-apk/app/build.gradle

      - name: Build native Pose Core APK
        run: |
          cd native-apk
          gradle :app:assembleDebug --stacktrace

      - name: Show APK outputs
        if: always()
        run: find native-apk/app/build/outputs -type f | sort || true

      - name: Upload Pose Core APK
        uses: actions/upload-artifact@v4
        with:
          name: StrikeVision-pose-core-apk
          path: native-apk/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
