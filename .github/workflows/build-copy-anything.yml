name: Build Copy Anything APK

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'copy-anything/**'
      - '.github/workflows/build-copy-anything.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;36.0.0'

      - name: Restore Android project
        run: |
          mkdir -p /tmp/copy-anything
          base64 --decode copy-anything/source.zip.b64 > /tmp/copy-anything-source.zip
          unzip -q /tmp/copy-anything-source.zip -d /tmp/copy-anything
          test -f /tmp/copy-anything/CopyAnythingProject/app/build.gradle

      - name: Build debug APK
        working-directory: /tmp/copy-anything/CopyAnythingProject
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp /tmp/copy-anything/CopyAnythingProject/app/build/outputs/apk/debug/app-debug.apk artifact/CopyAnything-v1.0-debug.apk
          sha256sum artifact/CopyAnything-v1.0-debug.apk > artifact/SHA256.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CopyAnything-APK
          path: artifact/
          if-no-files-found: error
          retention-days: 30
