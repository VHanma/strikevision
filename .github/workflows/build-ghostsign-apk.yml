name: Build GhostSign APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ghostsign/**'
      - '.github/workflows/build-ghostsign-apk.yml'
  push:
    branches:
      - ghostsign-text-signature
    paths:
      - 'ghostsign/**'
      - '.github/workflows/build-ghostsign-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd ghostsign
          gradle :app:assembleDebug --stacktrace

      - name: Upload GhostSign APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostSign-debug-apk
          path: ghostsign/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
