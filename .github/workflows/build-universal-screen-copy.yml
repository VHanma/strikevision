name: Build Universal Screen Copy APK

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'universal-screen-copy/**'
      - '.github/workflows/build-universal-screen-copy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;36.0.0'

      - name: Restore Android project
        run: |
          mkdir -p /tmp/universal-screen-copy
          base64 --decode universal-screen-copy/source.zip.b64 > /tmp/universal-screen-copy-source.zip
          unzip -q /tmp/universal-screen-copy-source.zip -d /tmp/universal-screen-copy
          test -f /tmp/universal-screen-copy/UniversalScreenCopyProject/app/build.gradle

      - name: Build debug APK
        working-directory: /tmp/universal-screen-copy/UniversalScreenCopyProject
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp /tmp/universal-screen-copy/UniversalScreenCopyProject/app/build/outputs/apk/debug/app-debug.apk artifact/UniversalScreenCopy-v2.0-debug.apk
          sha256sum artifact/UniversalScreenCopy-v2.0-debug.apk > artifact/SHA256.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalScreenCopy-APK
          path: artifact/
          if-no-files-found: error
          retention-days: 30
