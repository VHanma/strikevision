plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ghostsign.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.ghostsign.app'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.1-custom-signature-opacity'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
